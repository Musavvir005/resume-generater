<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overleaf Live Editor - Standalone LaTeX Workspace</title>
  
  <!-- CSS assets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/mdn-like.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  
  <meta name="description" content="A live Overleaf-style LaTeX workspace with real-time browser preview, autocomplete, and local draft file management." />
</head>
<body>

  <!-- 1. Header Toolbar Navigation -->
  <header class="app-header">
    <div class="brand-section">
      <div class="brand-logo">
        <i class="fas fa-pen-nib"></i> Overleaf Live
      </div>
      <div class="project-title-container">
        <input type="text" id="projectTitleInput" class="project-title-input" value="My LaTeX Document" title="Rename project" />
      </div>
    </div>

    <div class="header-toolbar">
      <div id="autosaveBadge" style="font-size: 0.75rem; color: var(--success); display: flex; align-items: center; gap: 4px; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 12px; transition: all 0.2s; font-weight: 500;">
        <i class="fas fa-cloud-upload-alt"></i> Saved
      </div>

      <div id="compileStatusBadge" class="compile-status-badge success">
        <i class="fas fa-check-circle"></i> Compiled
      </div>

      <button id="recompileBtn" class="btn btn-primary" title="Recompile LaTeX (Ctrl+Enter)">
        <i class="fas fa-play"></i> Recompile
      </button>

      <button id="downloadTexBtn" class="btn btn-secondary" title="Download LaTeX Source (.tex)">
        <i class="fas fa-download"></i> Download .tex
      </button>

      <button id="printPdfBtn" class="btn btn-secondary" title="Print to PDF (Ctrl+P)">
        <i class="fas fa-print"></i> Print PDF
      </button>

      <button id="copyCodeBtn" class="btn btn-secondary" title="Copy LaTeX code to clipboard">
        <i class="fas fa-copy"></i> Copy
      </button>

      <button id="themeToggleBtn" class="btn btn-ghost" title="Toggle Light/Dark Theme">
        <i class="fas fa-adjust"></i>
      </button>
    </div>
  </header>

  <!-- 2. Main Workspace 3-Column Layout -->
  <div class="main-workspace">
    
    <!-- Column 1: Sidebar explorer, templates, & settings -->
    <aside class="sidebar" id="sidebarPane">
      <div class="sidebar-body">
        
        <!-- Active Resume Template Pin -->
        <div class="template-section">
          <label><i class="fas fa-magic"></i> Active Layout Format</label>
          <div style="font-size: 0.8rem; background: var(--bg-subtle); border: 1px solid var(--border-color); border-radius: 6px; padding: 8px 10px; color: var(--text-main); font-weight: 500;">
            <i class="fas fa-file-invoice"></i> Jake's Resume (Default)
          </div>
          <select id="templateSelect" class="template-select" style="display: none;">
            <option value="jakes_resume" selected>Jake's Resume (Engineering)</option>
          </select>
        </div>

        <!-- Project File Tree Explorer -->
        <div>
          <div class="sidebar-header">
            <h3><i class="fas fa-folder-open"></i> Project Files</h3>
            <button id="newFileBtn" class="btn btn-ghost" style="padding: 2px 6px;" title="New File">
              <i class="fas fa-plus"></i>
            </button>
          </div>
          <ul class="file-list" id="fileTreeContainer">
            <!-- Dynamically populated files list -->
          </ul>
        </div>

        <!-- Editor Settings section -->
        <div class="template-section" style="border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: 8px;">
          <label style="margin-bottom: 8px; display: block;"><i class="fas fa-sliders-h"></i> Workspace Settings</label>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 0.7rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px;">
              Font Size
              <select id="fontSizeSelect" class="template-select">
                <option value="8px">8px</option>
                <option value="9px">9px</option>
                <option value="10px">10px</option>
                <option value="11px">11px</option>
                <option value="12px">12px</option>
                <option value="13px">13px</option>
                <option value="14px" selected>14px</option>
                <option value="16px">16px</option>
                <option value="18px">18px</option>
                <option value="20px">20px</option>
                <option value="24px">24px</option>
              </select>
            </label>

            <label style="font-size: 0.7rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px;">
              Editor Theme
              <select id="editorThemeSelect" class="template-select">
                <option value="dracula" selected>Dracula (Dark)</option>
                <option value="mdn-like">MDN (Light)</option>
              </select>
            </label>

            <label style="font-size: 0.7rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px;">
              Page Limit
              <select id="pageBudgetSelect" class="template-select">
                <option value="auto" selected>Auto / Unlimited</option>
                <option value="1">1 Page Limit</option>
                <option value="2">2 Pages Limit</option>
              </select>
            </label>

            <label style="font-size: 0.7rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px;">
              Spacing Compactness
              <select id="compactnessSelect" class="template-select">
                <option value="compact">Compact</option>
                <option value="normal" selected>Normal</option>
                <option value="loose">Loose</option>
              </select>
            </label>

            <label style="font-size: 0.7rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px;">
              Section Spacing
              <select id="sectionSpacingSelect" class="template-select">
                <option value="-18pt">Extra Compact (-18pt)</option>
                <option value="-15pt" selected>Compact (-15pt)</option>
                <option value="-10pt">Tight (-10pt)</option>
                <option value="-5pt">Medium (-5pt)</option>
                <option value="0pt">Standard (0pt)</option>
                <option value="5pt">Loose (5pt)</option>
                <option value="10pt">Extra Loose (10pt)</option>
              </select>
            </label>

            <label style="font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; justify-content: space-between; margin-top: 4px;">
              Line Wrapping
              <input type="checkbox" id="lineWrappingCheckbox" checked />
            </label>
          </div>
        </div>
      </div>

      <!-- AI Copilot Assistant Panel -->
      <div class="sidebar-footer">
        <div class="ai-assistant-widget">
          <div class="ai-header">
            <i class="fas fa-brain"></i> Gemini AI Assistant
          </div>
          <textarea id="aiPromptTextarea" class="ai-textarea" placeholder="Select text in the editor, or write here to polish LaTeX bullet points."></textarea>
          
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 0.65rem; color: var(--text-muted); display: block;">
              Gemini API Key (saved locally):
              <input type="password" id="geminiApiKeyInput" style="width:100%; font-size:0.75rem; background: var(--bg-subtle); border: 1px solid var(--border-color); color:var(--text-main); border-radius:4px; padding:3px 6px; margin-top:2px;" placeholder="Optional AI API Key" />
            </label>
            <button id="aiPolishBtn" class="btn btn-primary" style="width: 100%; font-size: 0.75rem; padding: 6px;">
              <i class="fas fa-sparkles"></i> Polish Content
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Resizer 1 (Sidebar - Editor) -->
    <div class="pane-resizer" id="sidebarResizer"></div>

    <!-- Column 2: Code Editor & Form Pane -->
    <section class="editor-pane" id="editorPane">
      
      <!-- Tab Headers -->
      <div class="editor-tabs">
        <button class="editor-tab active" id="tabFormBtn">
          <i class="fas fa-edit"></i> Form Input
        </button>
        <button class="editor-tab" id="tabCodeBtn">
          <i class="fas fa-code"></i> LaTeX Source
        </button>
      </div>

      <!-- Tab Content: Form Editor -->
      <div class="editor-tab-content active" id="formEditorContent">
        
        <!-- Accordion 1: Personal Details -->
        <div class="accordion-item active">
          <div class="accordion-header">
            <span><i class="fas fa-user-circle"></i> Personal Details</span>
            <i class="fas fa-chevron-down toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div class="form-grid">
              <label>Full Name <input type="text" id="formName" placeholder="Arekanti Siddartha" /></label>
              <label>Email <input type="email" id="formEmail" placeholder="siddarthaarekanti@gmail.com" /></label>
              <label>Phone <input type="text" id="formPhone" placeholder="+91 8688050497" /></label>
              <label>GitHub Link <input type="text" id="formGithub" placeholder="https://github.com/Siddartharekanti" /></label>
              <label>LinkedIn Link <input type="text" id="formLinkedin" placeholder="https://linkedin.com/in/username" /></label>
              <label>LeetCode Link <input type="text" id="formLeetcode" placeholder="https://leetcode.com/u/Siddartha_A/" /></label>
            </div>
          </div>
        </div>

        <!-- Accordion 2: Education -->
        <div class="accordion-item">
          <div class="accordion-header">
            <span><i class="fas fa-graduation-cap"></i> Education</span>
            <i class="fas fa-chevron-down toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div id="formEducationContainer"></div>
            <button type="button" class="btn btn-secondary" id="formAddEduBtn" style="width: 100%; margin-top: 12px;">
              <i class="fas fa-plus"></i> Add Education Entry
            </button>
          </div>
        </div>

        <!-- Accordion 3: Experience -->
        <div class="accordion-item">
          <div class="accordion-header">
            <span><i class="fas fa-briefcase"></i> Work Experience</span>
            <i class="fas fa-chevron-down toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div id="formExperienceContainer"></div>
            <button type="button" class="btn btn-secondary" id="formAddExpBtn" style="width: 100%; margin-top: 12px;">
              <i class="fas fa-plus"></i> Add Experience Entry
            </button>
          </div>
        </div>

        <!-- Accordion 4: Projects -->
        <div class="accordion-item">
          <div class="accordion-header">
            <span><i class="fas fa-project-diagram"></i> Projects</span>
            <i class="fas fa-chevron-down toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div id="formProjectsContainer"></div>
            <button type="button" class="btn btn-secondary" id="formAddProjBtn" style="width: 100%; margin-top: 12px;">
              <i class="fas fa-plus"></i> Add Project Entry
            </button>
          </div>
        </div>

        <!-- Accordion 5: Certificates -->
        <div class="accordion-item">
          <div class="accordion-header">
            <span><i class="fas fa-certificate"></i> Certificates</span>
            <i class="fas fa-chevron-down toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div id="formCertificatesContainer"></div>
            <button type="button" class="btn btn-secondary" id="formAddCertBtn" style="width: 100%; margin-top: 12px;">
              <i class="fas fa-plus"></i> Add Certificate Entry
            </button>
          </div>
        </div>

        <!-- Accordion 6: Technical Skills -->
        <div class="accordion-item">
          <div class="accordion-header">
            <span><i class="fas fa-cogs"></i> Technical Skills</span>
            <i class="fas fa-chevron-down toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div id="formSkillsContainer"></div>
            <button type="button" class="btn btn-secondary" id="formAddSkillBtn" style="width: 100%; margin-top: 12px;">
              <i class="fas fa-plus"></i> Add Skill Category
            </button>
          </div>
        </div>

      </div>

      <!-- Tab Content: Code Editor -->
      <div class="editor-tab-content" id="codeEditorContent" style="display: none; flex: 1;">
        <div style="flex: 1; display: flex; flex-direction: column; position: relative; height: 100%;">
          <textarea id="latexCodeArea" style="display: none;"></textarea>
        </div>
      </div>

    </section>

    <!-- Resizer 2 (Editor - Preview) -->
    <div class="pane-resizer" id="editorPreviewResizer"></div>

    <!-- Column 3: Document Preview Pane -->
    <section class="preview-pane" id="previewPane">
      <div class="preview-toolbar">
        <div class="preview-toolbar-left" id="compiledMetaText">
          Page 1 of 1
        </div>
        
        <div class="preview-toolbar-right">
          <div class="toggle-wrapper">
            <span>Auto Compile</span>
            <label class="toggle-switch">
              <input type="checkbox" id="autoCompileToggle" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <button id="zoomOutBtn" class="btn btn-ghost" style="padding: 4px 8px;" title="Zoom Out">
            <i class="fas fa-search-minus"></i>
          </button>
          <span id="zoomPercentText" style="font-size: 0.8rem; min-width: 40px; text-align: center;">95%</span>
          <button id="zoomInBtn" class="btn btn-ghost" style="padding: 4px 8px;" title="Zoom In">
            <i class="fas fa-search-plus"></i>
          </button>
        </div>
      </div>

      <!-- Rendered A4 sheet viewport -->
      <div class="document-viewport">
        <div class="resume-sheet" id="resumeSheet">
          <div id="compiledContentContainer">
            <!-- LaTeX compile target loads here -->
          </div>
        </div>
      </div>

      <!-- Log Panel Popup -->
      <div class="compile-log-panel" id="compileLogPanel">
        <!-- Compile diagnostic errors -->
      </div>
    </section>

  </div>

  <!-- Status Bar Footer -->
  <footer class="status-bar">
    <div class="status-bar-item" id="editorCursorPosition">
      Ln 1, Col 1
    </div>
    <div class="status-bar-item" id="documentStatsText">
      0 words, 0 characters
    </div>
  </footer>

  <!-- Script Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/stex/stex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/placeholder.min.js"></script>
  
  <!-- Project Scripts -->
  <script src="js/templateEngine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
